name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # audio/*.ogg is gitignored (real drum samples aren't redistributable - see
      # README.md "Audio samples"), so a fresh checkout has none of the 10 files
      # juce_add_binary_data needs. Generate short, non-silent placeholder tones in pure
      # PowerShell/.NET (no external tools - GitHub's Windows runners no longer ship
      # ffmpeg) for whichever of the 10 are missing, so AudioSmokeTests still exercises
      # real decode+playback. Any file that's actually present (e.g. real samples added
      # by some future provisioning step) is left untouched and used as-is.
      #
      # The generated bytes are a plain WAV file saved with a ".ogg" extension. That's
      # deliberate, not a mistake: JUCE's AudioFormatManager::createReaderFor(stream) -
      # the overload loadSamples() actually calls - detects format by sniffing the
      # stream's header, not by file extension (confirmed in
      # modules/juce_audio_formats/format/juce_AudioFormatManager.cpp), and WavAudioFormat
      # is always registered, no extra codec needed. Verified locally: swapping these
      # placeholders in for the real samples and running AudioSmokeTests passes all 8
      # cases before this was wired into CI.
      - name: Generate placeholder audio samples (only if missing)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path audio | Out-Null

          function New-PlaceholderWav {
              param(
                  [string]$Path,
                  [int]$SampleRate = 48000,
                  [double]$DurationSeconds = 0.3,
                  [double]$Frequency = 440.0
              )

              $numSamples = [int]($SampleRate * $DurationSeconds)
              $bitsPerSample = 16
              $numChannels = 1
              $byteRate = $SampleRate * $numChannels * ($bitsPerSample / 8)
              $blockAlign = $numChannels * ($bitsPerSample / 8)
              $dataSize = $numSamples * $blockAlign
              $chunkSize = 36 + $dataSize

              $ms = New-Object System.IO.MemoryStream
              $writer = New-Object System.IO.BinaryWriter($ms)

              $writer.Write([System.Text.Encoding]::ASCII.GetBytes("RIFF"))
              $writer.Write([int32]$chunkSize)
              $writer.Write([System.Text.Encoding]::ASCII.GetBytes("WAVE"))
              $writer.Write([System.Text.Encoding]::ASCII.GetBytes("fmt "))
              $writer.Write([int32]16)
              $writer.Write([int16]1)
              $writer.Write([int16]$numChannels)
              $writer.Write([int32]$SampleRate)
              $writer.Write([int32]$byteRate)
              $writer.Write([int16]$blockAlign)
              $writer.Write([int16]$bitsPerSample)
              $writer.Write([System.Text.Encoding]::ASCII.GetBytes("data"))
              $writer.Write([int32]$dataSize)

              for ($i = 0; $i -lt $numSamples; $i++) {
                  $t = $i / $SampleRate
                  $amplitude = 0.5 * [Math]::Sin(2 * [Math]::PI * $Frequency * $t)
                  $writer.Write([int16]($amplitude * 32767))
              }

              $writer.Flush()
              [System.IO.File]::WriteAllBytes($Path, $ms.ToArray())
              $writer.Close()
          }

          $samples = @(
            "Kick1", "Kick2", "Snare1", "HhClosed", "Ride1",
            "Crsh1", "Crsh2", "HiMidTom", "LoMidTom", "LowFlrTom"
          )

          foreach ($name in $samples) {
            $path = "audio/$name.ogg"
            if (Test-Path $path) {
              Write-Host "Using existing sample: $path"
            } else {
              Write-Host "Generating placeholder: $path"
              New-PlaceholderWav -Path $path
            }
          }

      - name: Configure CMake
        run: cmake -B build

      - name: Build RBDrumSamplerTests (Debug)
        run: cmake --build build --config Debug --target RBDrumSamplerTests

      - name: Run tests
        shell: pwsh
        run: |
          & "build/RBDrumSamplerTests_artefacts/Debug/RBDrumSamplerTests.exe"
          exit $LASTEXITCODE
